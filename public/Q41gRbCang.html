<!DOCTYPE html>

<style>
    body{
    background: rgb(248, 248, 248);
    padding: 10px;
    }

    h2{
    font-family: Arial;
    text-align: center;
    color: rgb(0, 0, 0);
    }

    form{
    font-family: Arial;
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 5px;
    }

    fieldset{
    margin-bottom: 3px;
    border-radius: 20px;
    }

    input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
    box-sizing: border-box;
    }

    input[type="submit"] {
    background-color: #2257c9;
    color: white;
    border: none;
    cursor: pointer;
    }

    input[type="submit"]:hover {
    background-color: #1a3e8c;
    }

    .star-rating {
    display: flex;
    flex-direction: row-reverse;
    justify-content: flex-end;
    }

    .star-rating > input { 
    display: none;  
    /* Hides radio buttons */
    }

    .star-rating > label {
    cursor: pointer;
    font-size: 2rem;
    color: #ddd; 
    /* Unselected color */
    }

    /* Styles for checked and hovered stars */
    .star-rating > input:checked ~ label,
    .star-rating > label:hover,
    .star-rating > label:hover ~ label { color: #f39c12; }

    .movie-card {
    background: #f9f9f9;
    padding: 15px;
    margin-top: 10px;
    border-radius: 5px;
    border-left: 4px solid #2257c9;
    }

    .stars {
    color: #f39c12;
    font-size: 1.2rem;
    }

 
</style>

<script>
    function confirmAdd(event) {
        event.preventDefault(); /* Prevent the default form submission */

      var title = document.getElementById("title").value;
      var year = document.getElementById("year").value;
      var genre = document.getElementById("genre").value;
      var ratingInput = document.querySelector('input[name="rating"]:checked');
      
      if (!ratingInput) {
        alert("Please select a rating!");
        return;
      }
      
      var rating = ratingInput.value;

    var movieDetails = JSON.parse(localStorage.getItem("movieDetails")) || [];
    movieDetails.push({
        title: title, year: year, genre: genre, rating: rating
    });
    localStorage.setItem("movieDetails", JSON.stringify(movieDetails));

    addMovie();
    /* adds movie to the list */
    
    /* Clear the form */
    document.querySelector("form").reset();

    }

    function addMovie() {
        var movieDetails = JSON.parse(localStorage.getItem("movieDetails")) || [];
        var container = document.getElementById("movieList");
            container.innerHTML = "";

            for (var i = 0; i < movieDetails.length; i++){
                var x = movieDetails[i];
                var star = "";
                for (var j = 1; j <= 5; j++){
                    star += j <= x.rating ? "★" : "☆";
                }
                container.innerHTML += 
                "<div class='movie-card'>" +
                "<strong>" + x.title + "</strong><br>" +
                "<span>" + x.year + " - " + x.genre + "</span><br>" +
                "<span class='stars'>" + star + "</span>" +
                "</div>";
    }
  }

  window.onload = addMovie;

</script>

<div class="container">
<form onsubmit="confirmAdd(event)">
  <h2> Add a Movie </h2>

  <label for="title">Title:</label><br>
  <input type="text" id="title" name="title" required><br><br><br>

  <label for="director">Year:</label><br>
  <input type="number" id="year" name="year" required><br><br><br>

  <label for="genre">Genre:</label><br>
  <select name="genre" id="genre" required>
    <option value="Action">Action</option>
    <option value="Comedy">Comedy</option>
    <option value="Drama">Drama</option>
    <option value="Horror">Horror</option>
    <option value="Sci-Fi">Sci-Fi</option>
    <option value="Romance">Romance</option>
    <option value="Musical">Musical</option>
    <option value="Fantasy">Fantasy</option>
  </select><br><br><br>

  <label for="rating">Rating:</label><br>
  <div class="star-rating">
        <input type="radio" id="s5" name="rating" value="5"><label for="s5">★</label>
        <input type="radio" id="s4" name="rating" value="4"><label for="s4">★</label>
        <input type="radio" id="s3" name="rating" value="3"><label for="s3">★</label>
        <input type="radio" id="s2" name="rating" value="2"><label for="s2">★</label>
        <input type="radio" id="s1" name="rating" value="1"><label for="s1">★</label>
    </div><br>

  <input type="submit" value="Add Movie"><br>
  </form>

  <h2> Movie List </h2>
  <div id="movieList"></div>
  </div>
